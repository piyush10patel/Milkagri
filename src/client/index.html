<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- PWA: Theme & Colors -->
    <meta name="theme-color" content="#2563eb" />

    <!-- PWA: iOS Safari specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MilkDelivery" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA: Standard icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS splash screens (prevents white flash on launch) -->
    <meta name="apple-mobile-web-app-orientations" content="portrait" />

    <title>Milk Delivery Platform</title>

    <!-- iOS safe area padding -->
    <style>
      body {
        -webkit-tap-highlight-color: transparent;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById('root');
        function showBootError(message) {
          if (!root) return;
          root.innerHTML =
            '<div style="padding:16px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#991b1b;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:16px;">' +
            '<h2 style="margin:0 0 8px 0;font-size:16px;">App failed to load</h2>' +
            '<p style="margin:0;font-size:14px;line-height:1.4;">' + message + '</p>' +
            '</div>';
        }
        window.addEventListener('error', function (event) {
          var msg = event && event.message ? event.message : 'Unknown JavaScript error';
          showBootError(msg);
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason ? String(event.reason) : 'Unhandled promise rejection';
          showBootError(reason);
        });

        if (!('serviceWorker' in navigator)) return;
        if (!window.location.protocol.startsWith('http')) return;
        navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            return Promise.all(registrations.map(function (registration) {
              return registration.unregister();
            }));
          })
          .then(function () {
            if (!('caches' in window)) return;
            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            });
          })
          .catch(function () {});
      })();
    </script>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
